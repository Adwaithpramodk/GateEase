{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forgot Password | GateEase</title>
    <link href="{% static 'css/tailwind.css' %}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex items-center justify-center p-4">
    {% include 'partials/messages.html' %}

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl shadow-slate-200/50 p-8 border border-slate-100 relative overflow-hidden">
        
        <!-- Decorative bg blob -->
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-indigo-50 rounded-full blur-3xl opacity-60 pointer-events-none"></div>

        <div class="relative z-10">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-sm shadow-slate-300">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 17v1c0 .5-.5 1-1 1H3c-.5 0-1-.5-1-1v-1"></path><path d="M4.5 12h15"></path><path d="M12 4v8"></path><polyline points="8 8 12 4 16 8"></polyline></svg>
                </div>
                <h1 class="text-2xl font-bold text-slate-900">Reset Password</h1>
                <p class="text-slate-500 mt-2 text-sm font-medium">Enter your registered email address to receive an OTP.</p>
            </div>

            <form method="POST" action="/ForgotPassword" class="space-y-4">
                {% csrf_token %}
                <div class="space-y-1.5">
                    <label class="block text-sm font-semibold text-slate-700">Email Address</label>
                    <input type="email" name="email" placeholder="you@example.com" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 outline-none text-slate-800 font-medium text-sm transition-all bg-slate-50/50 focus:bg-white">
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3.5 px-4 rounded-xl shadow-md shadow-indigo-200 hover:bg-indigo-700 active:scale-[0.98] transition-all flex items-center justify-center mt-6">
                    Send OTP
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="/login/" class="text-sm font-medium text-slate-500 hover:text-indigo-600 transition-colors flex items-center justify-center gap-1">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    Back to login
                </a>
            </div>
        </div>
    </div>
</body>
</html>

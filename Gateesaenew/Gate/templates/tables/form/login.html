{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GateEase - Login</title>
    <link href="{% static 'css/tailwind.css' %}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- PWA Setup -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('ServiceWorker registered'))
                    .catch(err => console.log('ServiceWorker registration failed: ', err));
            });
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .input-field {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
            background-color: #ffffff;
        }
        .input-field:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .btn-primary {
            width: 100%;
            padding: 12px 16px;
            background-color: #4f46e5;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #4338ca;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center p-4">

    {% include 'partials/messages.html' %}

    <div class="w-full max-w-sm bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
        
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Welcome back</h1>
            <p class="text-slate-500 text-sm mt-2">Sign in to your GateEase account</p>
        </div>

        <form action="/login/" method="POST" class="space-y-5">
            {% csrf_token %}
            
            <div>
                <label for="username" class="block text-sm font-medium text-slate-700 mb-1.5">Email / Username</label>
                <input type="text" id="username" name="username" class="input-field" placeholder="name@example.com" required>
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                <input type="password" id="password" name="password" class="input-field" placeholder="••••••••" required>
            </div>
            
            <div class="flex items-center justify-end">
                <a href="/ForgotPassword" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn-primary mt-2">Sign In</button>
            
            <div class="text-center pt-4">
                <p class="text-sm text-slate-600">
                    Don't have an account? <a href="/StudentRegister" class="font-semibold text-indigo-600 hover:text-indigo-500">Register here</a>
                </p>
            </div>
        </form>

    </div>
</body>
</html>

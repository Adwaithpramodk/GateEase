{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verify OTP & Reset Password | GateEase</title>
    <link href="{% static 'css/tailwind.css' %}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex items-center justify-center p-4">
    {% include 'partials/messages.html' %}

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl shadow-slate-200/50 p-8 border border-slate-100 relative overflow-hidden">
        
        <div class="relative z-10">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-sm shadow-slate-300">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                </div>
                <h1 class="text-2xl font-bold text-slate-900">Verify & Reset</h1>
                <p class="text-slate-500 mt-2 text-sm font-medium">OTP sent to <span class="text-slate-800 font-bold">{{ email }}</span></p>
            </div>

            <form method="POST" action="/ResetPassword" class="space-y-4">
                {% csrf_token %}
                <div class="space-y-1.5">
                    <label class="block text-sm font-semibold text-slate-700">6-Digit OTP</label>
                    <input type="number" name="otp" placeholder="Enter OTP" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 outline-none text-slate-800 font-bold tracking-widest text-center transition-all bg-slate-50/50 focus:bg-white">
                </div>

                <div class="space-y-1.5 pt-2">
                    <label class="block text-sm font-semibold text-slate-700">New Password</label>
                    <input type="password" name="new_password" placeholder="Min 8 characters" required minlength="8"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 outline-none text-slate-800 font-medium text-sm transition-all bg-slate-50/50 focus:bg-white">
                </div>

                <div class="space-y-1.5">
                    <label class="block text-sm font-semibold text-slate-700">Confirm Password</label>
                    <input type="password" name="confirm_password" placeholder="Confirm your new password" required minlength="8"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 outline-none text-slate-800 font-medium text-sm transition-all bg-slate-50/50 focus:bg-white">
                </div>

                <button type="submit" class="w-full bg-emerald-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-md shadow-emerald-200 hover:bg-emerald-600 active:scale-[0.98] transition-all flex items-center justify-center mt-6">
                    Update Password
                </button>
            </form>
        </div>
    </div>
</body>
</html>

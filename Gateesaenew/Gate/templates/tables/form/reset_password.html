{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GateEase - Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #0f172a;
            padding: 20px;
        }
        .login-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 40px;
            border: 1px solid #e2e8f0;
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .login-header p {
            color: #64748b;
            font-size: 15px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }
        .input-field {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            color: #1e293b;
            transition: all 0.2s ease;
            background-color: #f8fafc;
            letter-spacing: 0.5px;
        }
        .input-field:focus {
            outline: none;
            border-color: #4f46e5;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }
        .otp-field {
            text-align: center;
            letter-spacing: 4px;
            font-weight: 700;
            font-size: 18px;
        }
        .btn-primary {
            width: 100%;
            padding: 14px 16px;
            background-color: #4f46e5;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 8px;
        }
        .btn-primary:hover {
            background-color: #4338ca;
        }
        .register-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #64748b;
        }
        .register-footer a {
            font-weight: 600;
            color: #4f46e5;
            text-decoration: none;
        }
        .register-footer a:hover {
            text-decoration: underline;
        }
    </style>
    <link rel="shortcut icon" href="{% static 'favicon.png' %}">
</head>
<body>

    {% include 'partials/messages.html' %}

    <div class="login-card">
        <div class="login-header">
            <h1>Create New Password</h1>
            <p>Enter the 6-digit OTP sent to your email.</p>
        </div>

        <form action="/ResetPassword" method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="otp" class="form-label">6-Digit OTP</label>
                <input type="text" id="otp" name="otp" class="input-field otp-field" placeholder="000000" maxlength="6" pattern="[0-9]{6}" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="new_password" class="form-label">New Password</label>
                <input type="password" id="new_password" name="new_password" class="input-field" placeholder="••••••••" required minlength="6">
            </div>
            
            <div class="form-group">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="input-field" placeholder="••••••••" required minlength="6">
            </div>
            
            <button type="submit" class="btn-primary">Update Password</button>
            
            <div class="register-footer">
                <a href="/login/">Back to Sign In</a>
            </div>
        </form>
    </div>

    <script>
        const form = document.querySelector('form');
        const pwd = document.getElementById('new_password');
        const cpwd = document.getElementById('confirm_password');

        form.addEventListener('submit', function(e) {
            if (pwd.value !== cpwd.value) {
                e.preventDefault();
                alert('Passwords do not match. Please try again.');
                cpwd.focus();
            }
        });
    </script>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GateEase - Student Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #0f172a;
            padding: 20px;
        }

        .register-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 480px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 40px;
            border: 1px solid #e2e8f0;
            margin: 20px 0;
        }

        .register-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .register-header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .register-header p {
            color: #64748b;
            font-size: 15px;
        }

        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-col {
            flex: 1;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            color: #1e293b;
            transition: all 0.2s ease;
            background-color: #f8fafc;
        }

        .input-field:focus {
            outline: none;
            border-color: #4f46e5;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        select.input-field {
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/200.svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 14px center;
            padding-right: 40px;
        }

        input[type="file"]::file-selector-button {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            background-color: #eef2ff;
            color: #4f46e5;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-right: 12px;
        }

        input[type="file"]::file-selector-button:hover {
            background-color: #e0e7ff;
        }

        .btn-primary {
            width: 100%;
            padding: 14px 16px;
            background-color: #4f46e5;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 8px;
        }

        .btn-primary:hover {
            background-color: #4338ca;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #64748b;
        }

        .login-footer a {
            font-weight: 600;
            color: #4f46e5;
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .form-row {
                flex-direction: column;
                gap: 16px;
            }
        }
    </style>
    <link rel="shortcut icon" href="{% static 'favicon.png' %}">
</head>

<body>

    {% include 'partials/messages.html' %}

    <div class="register-card">
        <div class="register-header">
            <h1>Create Account</h1>
            <p>Register as a student on GateEase</p>
        </div>

        <form action="/StudentRegister" method="POST">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-col">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" id="name" name="name" class="input-field" placeholder="John Doe" required>
                </div>
                <div class="form-col">
                    <label for="admn_no" class="form-label">Admission No.</label>
                    <input type="number" id="admn_no" name="admn_no" class="input-field" placeholder="123456" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="input-field" placeholder="john@example.com" required>
            </div>

            <div class="form-group">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" id="phone" name="phone" class="input-field" placeholder="9876543210"
                    pattern="[0-9]{10}" title="Enter a valid 10-digit phone number" required>
            </div>

            <div class="form-group">
                <label for="classs" class="form-label">Batch / Class</label>
                <select id="classs" name="classs" class="input-field" required>
                    <option value="" disabled selected>Select your class</option>
                    {% for i in obj %}
                    <option value="{{ i.id }}">{{ i.class_name }}</option>
                    {% endfor %}
                </select>
            </div>



            <div class="form-row">
                <div class="form-col">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="input-field" placeholder="••••••••"
                        required minlength="6">
                </div>
                <div class="form-col">
                    <label for="cpassword" class="form-label">Confirm</label>
                    <input type="password" id="cpassword" name="cpassword" class="input-field" placeholder="••••••••"
                        required minlength="6">
                </div>
            </div>

            <button type="submit" class="btn-primary">Register Account</button>

            <div class="login-footer">
                Already have an account? <a href="/login/">Sign in</a>
            </div>
        </form>
    </div>

    <script>
        const form = document.querySelector('form');
        const pwd = document.getElementById('password');
        const cpwd = document.getElementById('cpassword');
        const submitBtn = document.querySelector('button[type="submit"]');

        form.addEventListener('submit', function (e) {
            if (pwd.value !== cpwd.value) {
                e.preventDefault();
                alert('Passwords do not match. Please try again.');
                cpwd.focus();
                return;
            }

            // Prevent double submission
            if (submitBtn.disabled) {
                e.preventDefault();
                return;
            }
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Registering...';
        });
    </script>
</body>

</html>

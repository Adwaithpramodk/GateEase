{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GateEase - Student Registration</title>
    <link href="{% static 'css/tailwind.css' %}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex items-center justify-center p-4 py-10">

    {% include 'partials/messages.html' %}

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl shadow-slate-200/50 p-8 border border-slate-100 relative overflow-hidden">
        
        <!-- Decorative bg blob -->
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-indigo-50 rounded-full blur-3xl opacity-60 pointer-events-none"></div>
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-purple-50 rounded-full blur-3xl opacity-60 pointer-events-none"></div>

        <div class="relative z-10">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-sm shadow-indigo-200">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><line x1="19" y1="8" x2="19" y2="14"></line><line x1="22" y1="11" x2="16" y2="11"></line></svg>
                </div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-slate-700 to-slate-900 tracking-tight">Create Account</h1>
                <p class="text-slate-500 mt-2 text-sm font-medium">Join GateEase as a Student</p>
            </div>

            <form method="POST" action="/StudentRegister" class="space-y-4">
                {% csrf_token %}
                
                <div class="space-y-1.5">
                    <label class="block text-sm font-semibold text-slate-700">Full Name</label>
                    <input type="text" name="name" placeholder="John Doe" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 outline-none text-slate-800 font-medium text-sm transition-all bg-slate-50/50 focus:bg-white placeholder-slate-400">
                </div>

                <div class="space-y-1.5">
                    <label class="block text-sm font-semibold text-slate-700">Email Address</label>
                    <input type="email" name="email" placeholder="student@example.com" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 outline-none text-slate-800 font-medium text-sm transition-all bg-slate-50/50 focus:bg-white placeholder-slate-400">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="block text-sm font-semibold text-slate-700">Admission No</label>
                        <input type="number" name="admn_no" placeholder="e.g. 12345" required
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 outline-none text-slate-800 font-medium text-sm transition-all bg-slate-50/50 focus:bg-white placeholder-slate-400">
                    </div>
                    <div class="space-y-1.5">
                        <label class="block text-sm font-semibold text-slate-700">Phone</label>
                        <input type="number" name="phone" placeholder="10 digits" required
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 outline-none text-slate-800 font-medium text-sm transition-all bg-slate-50/50 focus:bg-white placeholder-slate-400">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="block text-sm font-semibold text-slate-700">Class/Batch</label>
                    <select name="class_id" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 outline-none text-slate-800 font-medium text-sm transition-all bg-slate-50/50 focus:bg-white">
                        <option value="" disabled selected>-- Select your class --</option>
                        {% for c in classes %}
                            <option value="{{ c.id }}">{{ c.class_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="space-y-1.5">
                    <label class="block text-sm font-semibold text-slate-700">Password</label>
                    <input type="password" name="password" placeholder="Create a password (min 8 chars)" minlength="8" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 outline-none text-slate-800 font-medium text-sm transition-all bg-slate-50/50 focus:bg-white placeholder-slate-400">
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3.5 px-4 rounded-xl shadow-md shadow-indigo-200 hover:bg-indigo-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4">
                    Register
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </button>
            </form>

            <div class="mt-8 text-center border-t border-slate-100 pt-6">
                <p class="text-sm font-medium text-slate-500">
                    Already have an account? 
                    <a href="/login/" class="text-indigo-600 font-bold hover:text-indigo-700 hover:underline ml-1">Log in here</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
